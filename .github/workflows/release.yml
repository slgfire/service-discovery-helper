name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: x86_64
          - arch: aarch64
            platform: linux/arm64
          - arch: armhf
            platform: linux/arm/v7

    runs-on: ubuntu-latest
    name: Build (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.platform
        uses: docker/setup-qemu-action@v3

      - name: Build (native)
        if: ${{ !matrix.platform }}
        run: |
          sudo apt-get update && sudo apt-get install -y libpcap-dev
          make

      - name: Build (cross via Docker)
        if: matrix.platform
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/src" -w /src \
            debian:bookworm-slim \
            sh -c "apt-get update && apt-get install -y gcc make libpcap-dev && make"

      - name: Package
        run: |
          tar czf sdh-proxy-linux-${{ matrix.arch }}.tar.gz sdh-proxy ports interfaces GAMES.md README.md LICENSE

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdh-proxy-linux-${{ matrix.arch }}
          path: sdh-proxy-linux-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.gz
          body: |
            ## Service Discovery Helper

            UDP broadcast forwarder for game server discovery across VLANs.
            Ideal for LAN parties with multiple network segments.

            ### Downloads

            | File | Architecture |
            |------|-------------|
            | `sdh-proxy-linux-x86_64.tar.gz` | Linux x86_64 (64-bit) |
            | `sdh-proxy-linux-aarch64.tar.gz` | Linux ARM64 (Raspberry Pi 4/5, 64-bit OS) |
            | `sdh-proxy-linux-armhf.tar.gz` | Linux ARM 32-bit (Raspberry Pi 2/3/4, 32-bit OS) |

            ### Quick Start

            ```bash
            tar xzf sdh-proxy-linux-*.tar.gz
            # Edit 'ports' and 'interfaces' to match your setup
            sudo ./sdh-proxy -p ports -i interfaces -r
            ```

            ### Requirements

            - Linux with libpcap installed (`apt install libpcap0.8`)
            - Root privileges
            - 2 or more network interfaces

            See [README.md](https://github.com/slgfire/service-discovery-helper/blob/master/README.md) for full documentation.
