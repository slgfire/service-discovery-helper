name: CI

on:
  push:
    branches: [master, v2.0]
  pull_request:
    branches: [master, v2.0]

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: x86_64
          - arch: aarch64
            platform: linux/arm64
          - arch: armhf
            platform: linux/arm/v7

    runs-on: ubuntu-latest
    name: Build (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.platform
        uses: docker/setup-qemu-action@v3

      - name: Build (native)
        if: ${{ !matrix.platform }}
        run: |
          sudo apt-get update && sudo apt-get install -y libpcap-dev
          make
          file sdh-proxy

      - name: Build (cross via Docker)
        if: matrix.platform
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/src" -w /src \
            debian:bookworm-slim \
            sh -c "apt-get update && apt-get install -y gcc make libpcap-dev file && make && file sdh-proxy"
