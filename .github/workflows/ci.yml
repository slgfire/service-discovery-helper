name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            cc: gcc
          - arch: aarch64
            runner: ubuntu-24-arm
            cc: gcc
          - arch: armhf
            runner: ubuntu-latest
            cc: arm-linux-gnueabihf-gcc
            cross: true

    runs-on: ${{ matrix.runner }}
    name: Build (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          if [ "${{ matrix.cross }}" = "true" ]; then
            sudo dpkg --add-architecture armhf
            sudo apt-get update
            sudo apt-get install -y gcc-arm-linux-gnueabihf libpcap-dev:armhf
          else
            sudo apt-get install -y libpcap-dev
          fi

      - name: Build
        run: make CC=${{ matrix.cc }}

      - name: Verify binary
        run: file sdh-proxy
