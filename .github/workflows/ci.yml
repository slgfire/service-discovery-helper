name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24-arm
          - arch: armhf
            runner: ubuntu-latest
            platform: linux/arm/v7

    runs-on: ${{ matrix.runner }}
    name: Build (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.platform
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Build (native)
        if: ${{ !matrix.platform }}
        run: |
          sudo apt-get update && sudo apt-get install -y libpcap-dev
          make
          file sdh-proxy

      - name: Build (cross via Docker)
        if: matrix.platform
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/src" -w /src \
            debian:bookworm-slim \
            sh -c "apt-get update && apt-get install -y gcc make libpcap-dev file && make && file sdh-proxy"
