<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Network rings -->
  <circle cx="256" cy="240" r="150" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <circle cx="256" cy="240" r="110" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <circle cx="256" cy="240" r="70" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.8"/>
  <!-- Center broadcast node -->
  <circle cx="256" cy="240" r="24" fill="url(#glow)"/>
  <circle cx="256" cy="240" r="12" fill="#fff"/>
  <!-- VLAN nodes -->
  <circle cx="150" cy="150" r="16" fill="#e94560"/>
  <circle cx="362" cy="150" r="16" fill="#e94560"/>
  <circle cx="130" cy="290" r="16" fill="#e94560"/>
  <circle cx="382" cy="290" r="16" fill="#e94560"/>
  <circle cx="200" cy="370" r="16" fill="#e94560"/>
  <circle cx="312" cy="370" r="16" fill="#e94560"/>
  <!-- Connection lines (broadcast paths) -->
  <line x1="256" y1="240" x2="150" y2="150" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="240" x2="362" y2="150" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="240" x2="130" y2="290" stroke="#f5a623" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="240" x2="382" y2="290" stroke="#f5a623" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="240" x2="200" y2="370" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="240" x2="312" y2="370" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <!-- Broadcast wave arcs -->
  <path d="M 230 215 Q 256 195 282 215" fill="none" stroke="#f5a623" stroke-width="2" opacity="0.8"/>
  <path d="M 218 200 Q 256 172 294 200" fill="none" stroke="#f5a623" stroke-width="1.5" opacity="0.5"/>
  <path d="M 206 188 Q 256 152 306 188" fill="none" stroke="#f5a623" stroke-width="1" opacity="0.3"/>
  <!-- Text -->
  <text x="256" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="36" fill="#ffffff" letter-spacing="2">SDH</text>
  <text x="256" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="14" fill="#888" letter-spacing="4">SERVICE DISCOVERY HELPER</text>
</svg>
